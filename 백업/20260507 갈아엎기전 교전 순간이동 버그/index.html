<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>라인 배틀</title>

<style>

body{
    background:#333;
    color:#fff;
    font-family:sans-serif;
    margin:0;
    padding-top:10px;
}

#game-container{
    width:1000px;
    height:300px;
    margin:auto;
    border:2px solid #fff;
    position:relative;
    overflow:hidden;
}

.ui-wrap{
    width:1000px;
    margin:10px auto;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
}

.panel{
    width:45%;
}

.resource{
    display:flex;
    gap:10px;
    margin-bottom:5px;
}

.bar{
    width:200px;
    height:10px;
    background:#222;
    margin:3px 0;
    border:1px solid #555;
}

.gold{
    background:#ffd700;
    height:100%;
    width:0%;
}

.coin{
    background:#00ffff;
    height:100%;
    width:0%;
}

button{
    margin:2px;
    padding:4px 8px;
    font-weight:bold;
    border:none;
    cursor:pointer;
}

.btn-gold{
    background:#ffd700;
    color:#000;
}

.btn-coin{
    background:#00ffff;
    color:#000;
}

.unit-row{
    margin-top:5px;
}

.hp-box{
    font-size:18px;
    font-weight:bold;
    margin-top:5px;
}

#mini-game-popup{
    position:absolute;
    top:80px;
    left:300px;
    width:400px;
    background:#fff;
    color:#000;
    padding:20px;
    display:none;
    z-index:999;
    border:4px solid gold;
}

#tooltip{
    position:fixed;
    background:#111;
    color:#fff;
    padding:10px;
    border:2px solid #ffd700;
    display:none;
    white-space:pre-line;
    z-index:9999;
    font-size:14px;
    pointer-events:none;
    min-width:180px;
}

</style>
</head>

<body>

<!-- 게임 화면 -->

<div id="game-container">

    <!-- 미니게임 팝업 -->

    <div id="mini-game-popup">

        <h3>미니게임</h3>

        <button onclick="confirmMiniGame()">실행</button>

        <button onclick="closeMiniGame()">닫기</button>

    </div>

</div>

<!-- UI -->

<div class="ui-wrap">

    <!-- P1 -->

    <div class="panel">

        <h3>P1</h3>

        <div class="resource">
            <div>골드 : <span id="gold1">10</span></div>
            <div>코인 : <span id="coin1">0</span></div>
        </div>

        <div class="bar">
            <div id="g1" class="gold"></div>
        </div>

        <div class="bar">
            <div id="c1" class="coin"></div>
        </div>

        <div class="hp-box">
            거점 체력 :
            <span id="hp1">2000</span>
        </div>

        <div class="unit-row">

            <button
            class="btn-gold unit-btn"
            data-info="병사
체력 : 100
공격력 : 20
공격속도 : 2초
특징 : 기본 근접 / 밀치기 가능"
            onclick="spawnUnitUI(1,'melee')">
            병(3)
            </button>

            <button
            class="btn-gold unit-btn"
            data-info="궁수
체력 : 70
공격력 : 15
공격속도 : 2초
특징 : 원거리 공격"
            onclick="spawnUnitUI(1,'archer')">
            궁(4)
            </button>

            <button
            class="btn-gold unit-btn"
            data-info="기병
체력 : 200
공격력 : 25
공격속도 : 2초
특징 : 빠른 이동 / 밀치기 없음"
            onclick="spawnUnitUI(1,'cavalry')">
            기(7)
            </button>

            <button
            class="btn-gold unit-btn"
            data-info="탱커
체력 : 600
공격력 : 15
공격속도 : 2초
특징 : 밀치기 면역 / 강한 밀치기"
            onclick="spawnUnitUI(1,'tank')">
            장(8)
            </button>

            <button
            class="btn-gold unit-btn"
            data-info="마법사
체력 : 50
공격력 : 30
공격속도 : 4초
차징 : 3초
특징 : 광역 폭발"
            onclick="spawnUnitUI(1,'mage')">
            마(7)
            </button>

            <button
            class="btn-coin"
            onclick="openMiniGame()">
            미니게임
            </button>

        </div>

    </div>

    <!-- P2 -->

    <div class="panel" style="text-align:right;">

        <h3>P2</h3>

        <div class="resource" style="justify-content:flex-end;">
            <div>골드 : <span id="gold2">10</span></div>
            <div>코인 : <span id="coin2">0</span></div>
        </div>

        <div style="display:flex;flex-direction:column;align-items:flex-end;">

            <div class="bar">
                <div id="g2" class="gold"></div>
            </div>

            <div class="bar">
                <div id="c2" class="coin"></div>
            </div>

        </div>

        <div class="hp-box">
            거점 체력 :
            <span id="hp2">2000</span>
        </div>

        <div class="unit-row">

            <button
            class="btn-coin"
            onclick="openMiniGame()">
            미니게임
            </button>

            <button
            class="btn-gold unit-btn"
            data-info="마법사
체력 : 50
공격력 : 30
공격속도 : 4초
차징 : 3초
특징 : 광역 폭발"
            onclick="spawnUnitUI(2,'mage')">
            마(7)
            </button>

            <button
            class="btn-gold unit-btn"
            data-info="탱커
체력 : 600
공격력 : 15
공격속도 : 2초
특징 : 밀치기 면역 / 강한 밀치기"
            onclick="spawnUnitUI(2,'tank')">
            장(8)
            </button>

            <button
            class="btn-gold unit-btn"
            data-info="기병
체력 : 200
공격력 : 25
공격속도 : 2초
특징 : 빠른 이동 / 밀치기 없음"
            onclick="spawnUnitUI(2,'cavalry')">
            기(7)
            </button>

            <button
            class="btn-gold unit-btn"
            data-info="궁수
체력 : 70
공격력 : 15
공격속도 : 2초
특징 : 원거리 공격"
            onclick="spawnUnitUI(2,'archer')">
            궁(4)
            </button>

            <button
            class="btn-gold unit-btn"
            data-info="병사
체력 : 100
공격력 : 20
공격속도 : 2초
특징 : 기본 근접 / 밀치기 가능"
            onclick="spawnUnitUI(2,'melee')">
            병(3)
            </button>

        </div>

    </div>

</div>

<!-- 툴팁 -->

<div id="tooltip"></div>

<!-- Phaser -->

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

<!-- 게임 스크립트 -->

<script type="module" src="script.js"></script>

</body>
</html>
