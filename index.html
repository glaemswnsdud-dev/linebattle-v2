<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>라인 배틀</title>

<style>
body{
    background:#333;
    color:#fff;
    font-family:sans-serif;
    margin:0;
    padding-top:10px;
}

#game-container{
    width:1000px;
    height:360px;
    margin:auto;
    border:2px solid #fff;
    position:relative;
    overflow:hidden;
}

#control-guide{
    width:1000px;
    margin:8px auto;
    padding:8px 0;
    text-align:center;
    background:#222;
    border:1px solid #666;
    font-size:15px;
    font-weight:bold;
}

.ui-wrap{
    width:1000px;
    margin:10px auto;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
}

.panel{
    width:45%;
}

.resource{
    display:flex;
    gap:10px;
    margin-bottom:5px;
}

.bar{
    width:200px;
    height:10px;
    background:#222;
    margin:3px 0;
    border:1px solid #555;
}

.gold{
    background:#ffd700;
    height:100%;
    width:0%;
}

.coin{
    background:#00ffff;
    height:100%;
    width:0%;
}

button{
    margin:2px;
    padding:4px 8px;
    font-weight:bold;
    border:none;
    cursor:pointer;
}

.btn-gold{
    background:#ffd700;
    color:#000;
}

.btn-coin{
    background:#00ffff;
    color:#000;
}

.card-btn{
    background:#6a35c8;
    color:#fff;
    border:1px solid #fff;
    font-size:12px;
    padding:5px 7px;
}

.unit-row{
    margin-top:5px;
}

.card-row{
    margin-top:8px;
    min-height:34px;
}

.hp-box{
    font-size:18px;
    font-weight:bold;
    margin-top:5px;
}

#mini-game-popup{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.78);
    display:none;
    z-index:1500;
    justify-content:center;
    align-items:center;
}

#mini-game-box{
    width:570px;
    min-height:285px;
    background:#fff;
    color:#000;
    padding:14px;
    border:4px solid gold;
    text-align:center;
    box-sizing:border-box;
}

.mini-title{
    margin:0 0 8px 0;
}

.mini-select-wrap{
    display:flex;
    justify-content:center;
    gap:12px;
    margin:12px 0;
}

.mini-select-btn{
    width:160px;
    height:72px;
    background:#222;
    color:#fff;
    border:3px solid #ffd700;
    font-size:16px;
}

.capsule-machine{
    margin:8px auto;
    width:230px;
    height:110px;
    background:#d33;
    border:4px solid #900;
    border-radius:18px;
    position:relative;
}

.capsule-glass{
    position:absolute;
    left:35px;
    top:10px;
    width:100px;
    height:76px;
    background:#9ff;
    border:4px solid #fff;
    border-radius:50%;
    color:#000;
    font-size:34px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.capsule-lever{
    position:absolute;
    right:35px;
    top:33px;
    width:18px;
    height:50px;
    background:#222;
    border-radius:10px;
}

.capsule-lever::before{
    content:"";
    position:absolute;
    top:-18px;
    left:-9px;
    width:36px;
    height:36px;
    background:#ffd700;
    border-radius:50%;
}

.magic-card-wrap{
    display:flex;
    justify-content:center;
    gap:12px;
    margin:14px 0;
}

.magic-card{
    width:135px;
    height:110px;
    background:#3d1a78;
    color:#fff;
    border:3px solid #d9b3ff;
    font-size:15px;
    font-weight:bold;
    display:flex;
    justify-content:center;
    align-items:center;
    white-space:pre-line;
    cursor:pointer;
}

#mini-result,
#magic-result{
    min-height:36px;
    font-size:17px;
    font-weight:bold;
    white-space:pre-line;
    margin:6px 0;
}

#game-menu{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.75);
    display:none;
    z-index:2000;
    justify-content:center;
    align-items:center;
    text-align:center;
}

#game-menu-box{
    width:360px;
    background:#111;
    border:3px solid #ffd700;
    padding:24px;
    color:#fff;
}

#game-menu-title{
    font-size:36px;
    margin-bottom:20px;
    font-weight:bold;
}

#game-menu button{
    display:block;
    width:220px;
    margin:10px auto;
    padding:12px;
    font-size:18px;
}

#tooltip{
    position:fixed;
    background:#111;
    color:#fff;
    padding:10px;
    border:2px solid #ffd700;
    display:none;
    white-space:pre-line;
    z-index:9999;
    font-size:14px;
    pointer-events:none;
    min-width:240px;
}
</style>
</head>

<body>

<div id="game-container">

    <div id="mini-game-popup">
        <div id="mini-game-box">
            <h2 class="mini-title">미니게임 선택</h2>

            <div id="mini-select-screen">
                <p>원하는 미니게임을 선택하세요. 실행 전에는 코인이 소모되지 않습니다.</p>

                <div class="mini-select-wrap">
                    <button
                    class="mini-select-btn mini-info"
                    data-info="캡슐머신 확률
꽝 : 15%
골드10 : 14%
병사6 : 14%
궁수4 : 12%
골드30 : 9%
기병3 : 8%
혼합세트 : 7%
탱커2 : 6%
영웅 검영 : 5%
영웅 천궁 : 5%
영웅 성녀 : 5%"
                    onclick="selectCapsuleGame()">
                    캡슐머신<br>유닛 / 골드
                    </button>

                    <button
                    class="mini-select-btn mini-info"
                    data-info="마법 카드 뽑기
코인 1개 사용
카드 3장 중 1장 선택
보유 제한 : 플레이어당 5장

카드 종류
회복
폭발
랜덤 삭제
적군 후퇴
3초 정지"
                    onclick="selectMagicGame()">
                    마법 카드<br>카드 선택
                    </button>
                </div>
            </div>

            <div id="capsule-screen" style="display:none;">
                <p>레버를 돌리면 코인 1개를 사용합니다.</p>

                <div class="capsule-machine">
                    <div class="capsule-glass" id="capsule-glass">?</div>
                    <div class="capsule-lever"></div>
                </div>

                <button onclick="pullCapsule()">레버 돌리기</button>
                <div id="mini-result"></div>
            </div>

            <div id="magic-screen" style="display:none;">
                <p>카드 1장을 선택하면 코인 1개를 사용합니다.</p>

                <div class="magic-card-wrap">
                    <div class="magic-card" onclick="pickMagicCard(0)">?</div>
                    <div class="magic-card" onclick="pickMagicCard(1)">?</div>
                    <div class="magic-card" onclick="pickMagicCard(2)">?</div>
                </div>

                <div id="magic-result"></div>
            </div>

            <button onclick="closeMiniGame()">나가기</button>
        </div>
    </div>

    <div id="game-menu">
        <div id="game-menu-box">
            <div id="game-menu-title">PAUSE</div>
            <button id="resume-btn" onclick="resumeGame()">재개</button>
            <button onclick="restartGame()">다시 시작</button>
        </div>
    </div>

</div>

<div id="control-guide">
    조작키 안내 : ← / → 방향키로 화면 이동　|　ESC : 일시정지 / 메뉴 열기　|　미니게임 : 코인 1개 사용　|　마법 카드는 최대 5장 보유
</div>

<div class="ui-wrap">

    <div class="panel">
        <h3>P1</h3>

        <div class="resource">
            <div>골드 : <span id="gold1">30</span></div>
            <div>코인 : <span id="coin1">5</span></div>
        </div>

        <div class="bar"><div id="g1" class="gold"></div></div>
        <div class="bar"><div id="c1" class="coin"></div></div>

        <div class="hp-box">거점 체력 : <span id="hp1">2000</span></div>

        <div class="unit-row">
            <button class="btn-gold unit-btn" data-info="병사
체력 : 100
공격력 : 20
공격속도 : 1초
특징 : 기본 근접 / 밀치기 가능" onclick="spawnUnitUI(1,'melee')">병(3)</button>

            <button class="btn-gold unit-btn" data-info="궁수
체력 : 70
공격력 : 15
공격속도 : 1초
특징 : 원거리 공격" onclick="spawnUnitUI(1,'archer')">궁(4)</button>

            <button class="btn-gold unit-btn" data-info="기병
체력 : 200
공격력 : 20
공격속도 : 0.5초
특징 : 빠른 이동 / 강한 밀치기" onclick="spawnUnitUI(1,'cavalry')">기(7)</button>

            <button class="btn-gold unit-btn" data-info="탱커
체력 : 600
공격력 : 15
공격속도 : 1초
특징 : 밀치기 면역" onclick="spawnUnitUI(1,'tank')">장(8)</button>

            <button class="btn-gold unit-btn" data-info="마법사
체력 : 50
공격력 : 30
공격속도 : 2초
차징 : 3초
특징 : 광역 폭발" onclick="spawnUnitUI(1,'mage')">마(7)</button>

            <button class="btn-coin" onclick="openMiniGame(1)">미니게임</button>
        </div>

        <div class="card-row">
            마법 카드 : <span id="cards1"></span>
        </div>
    </div>

    <div class="panel" style="text-align:right;">
        <h3>P2</h3>

        <div class="resource" style="justify-content:flex-end;">
            <div>골드 : <span id="gold2">30</span></div>
            <div>코인 : <span id="coin2">5</span></div>
        </div>

        <div style="display:flex;flex-direction:column;align-items:flex-end;">
            <div class="bar"><div id="g2" class="gold"></div></div>
            <div class="bar"><div id="c2" class="coin"></div></div>
        </div>

        <div class="hp-box">거점 체력 : <span id="hp2">2000</span></div>

        <div class="unit-row">
            <button class="btn-coin" onclick="openMiniGame(2)">미니게임</button>

            <button class="btn-gold unit-btn" data-info="마법사
체력 : 50
공격력 : 30
공격속도 : 2초
차징 : 3초
특징 : 광역 폭발" onclick="spawnUnitUI(2,'mage')">마(7)</button>

            <button class="btn-gold unit-btn" data-info="탱커
체력 : 600
공격력 : 15
공격속도 : 1초
특징 : 밀치기 면역" onclick="spawnUnitUI(2,'tank')">장(8)</button>

            <button class="btn-gold unit-btn" data-info="기병
체력 : 200
공격력 : 20
공격속도 : 0.5초
특징 : 빠른 이동 / 강한 밀치기" onclick="spawnUnitUI(2,'cavalry')">기(7)</button>

            <button class="btn-gold unit-btn" data-info="궁수
체력 : 70
공격력 : 15
공격속도 : 1초
특징 : 원거리 공격" onclick="spawnUnitUI(2,'archer')">궁(4)</button>

            <button class="btn-gold unit-btn" data-info="병사
체력 : 100
공격력 : 20
공격속도 : 1초
특징 : 기본 근접 / 밀치기 가능" onclick="spawnUnitUI(2,'melee')">병(3)</button>
        </div>

        <div class="card-row">
            마법 카드 : <span id="cards2"></span>
        </div>
    </div>

</div>

<div id="tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script type="module" src="script.js"></script>

</body>
</html>
